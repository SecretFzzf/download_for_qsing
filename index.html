<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歌曲下载器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 520px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    padding: 36px 32px 28px;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .header .icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 14px;
    display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 26px;
    margin-bottom: 12px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 4px;
  }

  .header p {
    font-size: 13px;
    color: #9ca3af;
  }

  .field {
    margin-bottom: 18px;
  }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    padding: 11px 14px;
    font-size: 14px;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }

  .field input:focus {
    border-color: #667eea;
  }

  .progress-wrap {
    height: 4px;
    background: #e5e7eb;
    border-radius: 2px;
    margin-bottom: 18px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .progress-wrap.active { opacity: 1; }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .progress-bar.indeterminate {
    width: 40%;
    animation: sweep 1.2s ease-in-out infinite;
  }

  @keyframes sweep {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  .btn {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    font-family: inherit;
    letter-spacing: 2px;
  }

  .btn:hover  { opacity: 0.92; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .status {
    text-align: center;
    font-size: 13px;
    color: #9ca3af;
    margin-top: 12px;
    min-height: 18px;
    transition: color 0.3s;
  }

  .status.success { color: #10b981; }
  .status.error   { color: #ef4444; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="icon">🎵</div>
    <h1>歌曲下载器</h1>
    <p>输入歌曲名称和网页链接，自动分析并下载</p>
  </div>

  <div class="field">
    <label>歌曲名称</label>
    <input type="text" id="nameInput" placeholder="例如：三十岁的女人" autocomplete="off">
  </div>

  <div class="field">
    <label>歌曲网页链接</label>
    <input type="text" id="urlInput" placeholder="https://kg.qq.com/node/play?s=... 或其他音乐网页链接" autocomplete="off">
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar indeterminate" id="progressBar"></div>
  </div>

  <button class="btn" id="downloadBtn" onclick="downloadSong()">下  载</button>
  <div class="status" id="status"></div>
</div>

<script>
function setStatus(text, cls) {
  const el = document.getElementById("status");
  el.textContent = text;
  el.className = "status " + (cls || "");
}

function toggleLoading(active) {
  const btn = document.getElementById("downloadBtn");
  const wrap = document.getElementById("progressWrap");
  btn.disabled = active;
  btn.textContent = active ? "下载中..." : "下  载";
  wrap.className = "progress-wrap" + (active ? " active" : "");
}

async function downloadSong() {
  const name = document.getElementById("nameInput").value.trim();
  const url  = document.getElementById("urlInput").value.trim();

  if (!name) { setStatus("请输入歌曲名称", "error"); return; }
  if (!url)  { setStatus("请输入歌曲网页链接", "error"); return; }

  toggleLoading(true);
  setStatus("正在获取页面信息...");

  try {
    // 调用后端API，由后端爬虫分析页面并直接返回文件
    const resp = await fetch('/api/download', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ name: name, url: url })
    });

    // 检查是否是错误响应（JSON格式）
    const contentType = resp.headers.get('content-type');
    if (contentType && contentType.includes('application/json')) {
      const result = await resp.json();
      toggleLoading(false);
      setStatus(result.error || "下载失败", "error");
      return;
    }

    if (!resp.ok) {
      toggleLoading(false);
      setStatus("下载失败: HTTP " + resp.status, "error");
      return;
    }

    setStatus("正在下载文件...");

    // 获取文件二进制数据
    const blob = await resp.blob();

    if (blob.size === 0) {
      toggleLoading(false);
      setStatus("下载文件为空", "error");
      return;
    }

    // 获取文件名（从Content-Disposition头或使用输入的名称）
    const disposition = resp.headers.get('content-disposition');
    let filename = name + '.mp3';
    if (disposition) {
      const matches = disposition.match(/filename="(.+?)"/);
      if (matches) filename = matches[1];
    }

    // 创建下载链接
    const downloadUrl = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = downloadUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(downloadUrl);

    const sizeMB = (blob.size / (1024 * 1024)).toFixed(1);
    toggleLoading(false);
    setStatus("下载完成 - " + filename + " (" + sizeMB + " MB)", "success");

  } catch (err) {
    toggleLoading(false);
    if (err.message.includes("Failed to fetch")) {
      setStatus("无法连接服务器，请确保后端已启动: python server.py", "error");
    } else {
      setStatus("下载失败: " + err.message, "error");
    }
  }
}

document.getElementById("urlInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") downloadSong();
});
document.getElementById("nameInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") downloadSong();
});
</script>
</body>
</html>
